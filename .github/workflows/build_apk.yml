name: Build Flutter APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # On ne précise plus de version, il prendra la dernière stable

      - name: Get dependencies
        run: |
          cd laure_app
          flutter pub get

      - name: Build APK
        run: |
          cd laure_app
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: laure-bot-apk
          path: laure_app/build/app/outputs/flutter-apk/app-release.apk
